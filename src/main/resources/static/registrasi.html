<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIP Market - Daftar Akun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body class="bg-gradient-to-br from-[#0038d6] via-[#0046ff] to-[#0033b8] min-h-screen flex items-center justify-center p-5">

    <div class="bg-white rounded-[20px]
        shadow-[0_20px_40px_rgba(0,0,0,0.15)]
        w-full max-w-[460px]
        px-10 py-8">

        <!-- Logo -->
        <div class="text-center">
            <div class="flex justify-center items-center gap-2 text-[#0046ff]">
                <i class="fa-solid fa-cart-shopping text-3xl"></i>
                <div class="text-left">
                    <h2 class="font-bold text-3xl">UNIP</h2>
                    <p class="text-xs tracking-[3px]">MARKET</p>
                </div>
            </div>
            <h3 class="mt-5 text-2xl font-bold text-gray-700">Buat Akun Baru</h3>
            <p class="text-sm text-gray-400 mt-1">Daftar untuk mulai berbelanja atau berjualan</p>
        </div>

        <!-- FORM -->
        <form id="registerForm" class="mt-8">

            <!-- Nama Lengkap -->
            <div>
                <label class="block text-sm text-gray-600 mb-2">
                    Nama Lengkap <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input
                        id="nama"
                        type="text"
                        placeholder="Masukkan nama lengkap Anda"
                        class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-4
                        text-sm
                        outline-none
                        focus:border-blue-600 transition">
                </div>
            </div>

            <!-- Alamat -->
            <div class="mt-5">
                <label class="block text-sm text-gray-600 mb-2">
                    Alamat <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <i class="fa-solid fa-location-dot absolute left-3 top-3.5 text-gray-400"></i>
                    <textarea
                        id="alamat"
                        placeholder="Masukkan alamat lengkap Anda"
                        rows="3"
                        class="w-full
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-4 pt-3
                        text-sm
                        outline-none
                        focus:border-blue-600 transition
                        resize-none"></textarea>
                </div>
            </div>

            <!-- Role -->
            <div class="mt-5">
                <label class="block text-sm text-gray-600 mb-3">
                    Daftar Sebagai <span class="text-red-500">*</span>
                </label>
                <div class="grid grid-cols-2 gap-3">

                    <!-- Pembeli -->
                    <label id="labelPembeli"
                        class="role-card flex flex-col items-center gap-2
                        border-2 border-gray-200
                        rounded-xl p-4 cursor-pointer
                        hover:border-blue-400 transition-all">
                        <input type="radio" name="role" value="pembeli" class="hidden">
                        <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center">
                            <i class="fa-solid fa-bag-shopping text-2xl text-blue-500"></i>
                        </div>
                        <span class="font-semibold text-gray-700 text-sm">Pembeli</span>
                        <span class="text-xs text-gray-400 text-center">Cari & beli produk UMKM</span>
                    </label>

                    <!-- Penjual -->
                    <label id="labelPenjual"
                        class="role-card flex flex-col items-center gap-2
                        border-2 border-gray-200
                        rounded-xl p-4 cursor-pointer
                        hover:border-blue-400 transition-all">
                        <input type="radio" name="role" value="penjual" class="hidden">
                        <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center">
                            <i class="fa-solid fa-store text-2xl text-green-500"></i>
                        </div>
                        <span class="font-semibold text-gray-700 text-sm">Penjual</span>
                        <span class="text-xs text-gray-400 text-center">Jual produk UMKM Anda</span>
                    </label>

                </div>
                <p id="roleError" class="text-red-500 text-xs mt-1 hidden">Pilih salah satu role.</p>
            </div>

            <!-- Email -->
            <div class="mt-5">
                <label class="block text-sm text-gray-600 mb-2">
                    Email <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input
                        id="email"
                        type="email"
                        placeholder="contoh@email.com"
                        class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-4
                        text-sm
                        outline-none
                        focus:border-blue-600 transition">
                </div>
            </div>

            <!-- Password -->
            <div class="mt-5">
                <label class="block text-sm text-gray-600 mb-2">
                    Password <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input
                        id="password"
                        type="password"
                        placeholder="Minimal 6 karakter"
                        class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-10
                        text-sm
                        outline-none
                        focus:border-blue-600 transition">
                    <button
                        id="togglePasswordBtn1"
                        type="button"
                        class="absolute right-3 top-1/2 -translate-y-1/2">
                        <i id="eyeIcon1" class="fa-regular fa-eye text-gray-500"></i>
                    </button>
                </div>
            </div>

            <!-- Konfirmasi Password -->
            <div class="mt-5">
                <label class="block text-sm text-gray-600 mb-2">
                    Konfirmasi Password <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input
                        id="confirmPassword"
                        type="password"
                        placeholder="Ulangi password Anda"
                        class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-10
                        text-sm
                        outline-none
                        focus:border-blue-600 transition">
                    <button
                        id="togglePasswordBtn2"
                        type="button"
                        class="absolute right-3 top-1/2 -translate-y-1/2">
                        <i id="eyeIcon2" class="fa-regular fa-eye text-gray-500"></i>
                    </button>
                </div>
                <p id="passwordError" class="text-red-500 text-xs mt-1 hidden">Password tidak cocok.</p>
            </div>

            <!-- Tombol Daftar -->
            <button
                type="submit"
                class="w-full h-[45px]
                mt-6
                bg-[#0046ff]
                hover:bg-[#0035cc]
                rounded-lg
                font-semibold
                text-white
                transition">
                DAFTAR SEKARANG
            </button>

        </form>

        <!-- Sudah punya akun -->
        <p class="text-center mt-6 text-sm text-gray-500">
            Sudah punya akun?
            <a href="login.html" class="text-blue-700 font-semibold hover:underline">
                Login di sini
            </a>
        </p>

    </div>

    <!-- Custom JS (Static) -->
    <script src="/js/registrasi.js"></script>

</body>
</html>
