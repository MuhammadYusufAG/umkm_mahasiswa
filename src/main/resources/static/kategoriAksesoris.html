<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Aksesoris - UNIP Market</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom CSS (Static) -->
    <link class="main-css" rel="stylesheet" href="/css/kategoriAksesoris.css">
</head>


<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow">

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping text-3xl text-blue-700"></i>

                <div>
                    <h1 class="font-bold text-2xl text-blue-700">UNIP</h1>
                    <p class="text-xs tracking-[5px] text-blue-700">MARKET</p>
                </div>
            </div>

            <a href="dashboard.html" class="bg-blue-700 text-white px-4 py-2 rounded-xl">
                Kembali
            </a>

        </div>

    </header>

    <!-- Banner -->
    <section class="container mx-auto px-6 py-8">

        <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white rounded-3xl p-10">

            <h1 class="text-4xl font-bold">
                👜 Kategori Aksesoris
            </h1>

            <p class="mt-3 text-blue-100">
                Temukan aksesoris keren untuk menunjang gaya kamu.
            </p>

        </div>

    </section>

    <!-- Produk -->
    <section class="container mx-auto px-6 pb-10">

        <h2 class="font-bold text-2xl mb-6">
            Daftar Aksesoris
        </h2>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.7" data-nama="Jam Tangan Elegan"
                data-harga="120000"
                data-deskripsi="Jam tangan stylish dengan desain minimalis modern, cocok untuk aktivitas formal maupun santai."
                data-bahan="Stainless steel, kaca mineral, strap kulit sintetis">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Jam+Tangan+Elegan';">

                <div class="p-4">
                    <h3 class="font-bold">Jam Tangan Elegan</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 120.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.8" data-nama="Tas Ransel Premium"
                data-harga="95000"
                data-deskripsi="Tas ransel kuat dan ringan, cocok untuk kuliah, kerja, atau traveling."
                data-bahan="Polyester waterproof, zipper premium">
                <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Tas+Ransel+Premium';">

                <div class="p-4">
                    <h3 class="font-bold">Tas Ransel Premium</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 95.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.9" data-nama="Kacamata Hitam"
                data-harga="45000"
                data-deskripsi="Kacamata stylish untuk melindungi mata dari sinar UV dengan desain kekinian."
                data-bahan="Frame plastik premium, lensa UV protection">
                <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Kacamata+Hitam';">

                <div class="p-4">
                    <h3 class="font-bold">Kacamata Hitam</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 45.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.7" data-nama="Headset Gaming"
                data-harga="135000"
                data-deskripsi="Headset dengan suara jernih dan bass kuat, cocok untuk gaming dan musik."
                data-bahan="Driver 40mm, kabel braided, mic noise reduction">
                <img src="https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Headset+Gaming';">

                <div class="p-4">
                    <h3 class="font-bold">Headset Gaming</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 135.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

        </div>

    </section>

    <!-- Modal Deskripsi Produk -->
    <div id="modalProduk" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">

        <div class="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-xl relative">

            <button id="btnTutupModal" type="button"
                class="absolute top-3 right-3 w-9 h-9 rounded-full bg-white/90 shadow flex items-center justify-center text-gray-600 hover:text-red-600">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <img id="modalImg" src="" class="w-full h-56 object-cover">

            <div class="p-6">
                <h3 id="modalNama" class="font-bold text-2xl"></h3>
                <p id="modalHarga" class="text-blue-700 font-semibold mt-1"></p>

                <p class="mt-4 text-sm font-semibold text-gray-500">Deskripsi</p>
                <p id="modalDeskripsi" class="text-gray-700 mt-1"></p>

                <p class="mt-4 text-sm font-semibold text-gray-500">Bahan / Komposisi</p>
                <p id="modalBahan" class="text-gray-700 mt-1"></p>
            </div>

        </div>

    </div>

    <!-- Custom JS (Static) -->
    <script src="/js/produk.js"></script>
    <script src="/js/toast.js"></script>
</body>

</html>
