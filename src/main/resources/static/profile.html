<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIP Market - Profil Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .custom-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4 sm:p-6">

    <div class="custom-card w-full max-w-lg rounded-3xl p-8 sm:p-10 shadow-xl relative overflow-hidden transition-all duration-300 hover:shadow-2xl">
        <!-- Background Glows -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-400 rounded-full blur-3xl opacity-10 pointer-events-none"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-purple-400 rounded-full blur-3xl opacity-10 pointer-events-none"></div>

        <!-- Header -->
        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-500 text-white text-3xl font-extrabold shadow-lg shadow-blue-500/25 mb-4" id="userInitial">
                U
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-800 mb-1" id="profileUsername">Memuat nama...</h1>
            <p class="text-sm text-slate-500 font-semibold uppercase tracking-wider" id="profileRole">Memuat peran...</p>
        </div>

        <!-- Profile Details -->
        <div class="space-y-4 mb-8 relative z-10">
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                    <i class="fa-regular fa-envelope text-lg"></i>
                </div>
                <div>
                    <span class="text-xs text-slate-400 block font-semibold uppercase tracking-wider">Email</span>
                    <span class="text-slate-700 font-medium break-all" id="profileEmail">Memuat email...</span>
                </div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-lg"></i>
                </div>
                <div>
                    <span class="text-xs text-slate-400 block font-semibold uppercase tracking-wider">Peran Akun</span>
                    <span class="text-slate-700 font-medium" id="profileRoleText">Memuat peran...</span>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="space-y-3 relative z-10">
            <button id="btnHome" class="w-full bg-[#0046ff] hover:bg-blue-700 text-white py-3.5 rounded-2xl font-bold transition flex items-center justify-center gap-2 shadow-md shadow-blue-500/20">
                <i class="fa-solid fa-house"></i> Kembali ke Beranda
            </button>

            <button id="btnLogout" class="w-full bg-slate-100 hover:bg-slate-200/80 text-slate-700 py-3.5 rounded-2xl font-bold transition flex items-center justify-center gap-2 border border-slate-200">
                <i class="fa-solid fa-right-from-bracket"></i> Logout Akun
            </button>

            <button id="btnDeleteAccount" class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-3.5 rounded-2xl font-bold transition flex items-center justify-center gap-2 border border-red-200">
                <i class="fa-regular fa-trash-can"></i> Hapus Akun Saya
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toastNotification" class="fixed inset-0 flex items-center justify-center bg-black/30 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="custom-card max-w-sm w-full mx-4 rounded-3xl p-6 shadow-2xl text-center border border-slate-200">
            <div id="toastIcon" class="w-16 h-16 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-2xl mx-auto mb-4 border border-green-200">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <p id="toastMessage" class="text-slate-700 font-medium mb-4">Pesan notifikasi...</p>
            <button id="toastCloseBtn" class="bg-[#0046ff] hover:bg-blue-700 text-white font-bold px-6 py-2.5 rounded-xl transition text-sm">
                Tutup
            </button>
        </div>
    </div>

    <script src="/js/profile.js"></script>
    <script src="/js/toast.js"></script>
</body>
</html>
