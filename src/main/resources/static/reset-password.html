<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - UMKM App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md mx-4">
        
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-blue-50 rounded-full mb-4">
                <i class="fa-solid fa-lock-open text-3xl text-blue-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Buat Password Baru</h1>
            <p class="text-sm text-gray-500 mt-2">
                Silakan masukkan password baru Anda di bawah ini.
            </p>
        </div>

        <form id="resetPasswordForm">
            
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Password Baru
                </label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input 
                        id="newPassword"
                        type="password" 
                        placeholder="Minimal 6 karakter"
                        class="w-full h-[45px] border border-gray-200 rounded-lg pl-10 pr-10 text-sm outline-none focus:border-blue-600 transition"
                        required>
                    <button type="button" id="toggleP1" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fa-regular fa-eye" id="eye1"></i>
                    </button>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Ulangi Password Baru
                </label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input 
                        id="confirmPassword"
                        type="password" 
                        placeholder="Ulangi password baru"
                        class="w-full h-[45px] border border-gray-200 rounded-lg pl-10 pr-10 text-sm outline-none focus:border-blue-600 transition"
                        required>
                    <button type="button" id="toggleP2" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fa-regular fa-eye" id="eye2"></i>
                    </button>
                </div>
                <p id="passwordError" class="text-red-500 text-xs mt-1 hidden">Password tidak cocok.</p>
            </div>

            <button 
                type="submit"
                id="submitBtn"
                class="w-full h-[45px] bg-[#0046ff] hover:bg-[#0035cc] rounded-lg font-semibold text-white transition flex items-center justify-center">
                <span>Simpan Password Baru</span>
            </button>
            
        </form>
    </div>

    <!-- Custom Notification Toast -->
    <div id="toastNotification" class="fixed inset-0 flex items-center justify-center bg-black/30 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center">
            <div id="toastIconContainer" class="w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-red-100 text-red-600">
                <i id="toastIcon" class="fa-solid fa-circle-exclamation text-3xl"></i>
            </div>
            <h3 id="toastTitle" class="text-xl font-bold text-gray-800 mb-2">Pemberitahuan</h3>
            <p id="toastMessage" class="text-gray-600 mb-6">Pesan di sini.</p>
            <button id="closeToastBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors w-full">
                Tutup
            </button>
        </div>
    </div>

    <script src="/js/reset-password.js"></script>

</body>
</html>
