<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Jus - UNIP Market</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom CSS (Static) -->
    <link class="main-css" rel="stylesheet" href="/css/kategorijus.css">
</head>


<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow">

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping text-3xl text-blue-700"></i>

                <div>
                    <h1 class="font-bold text-2xl text-blue-700">UNIP</h1>
                    <p class="text-xs tracking-[5px] text-blue-700">MARKET</p>
                </div>
            </div>

            <a href="dashboard.html" class="bg-blue-700 text-white px-4 py-2 rounded-xl">
                Kembali
            </a>

        </div>

    </header>

    <!-- Banner -->
    <section class="container mx-auto px-6 py-8">

        <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white rounded-3xl p-10">

            <h1 class="text-4xl font-bold">
                🥤 Kategori Jus
            </h1>

            <p class="mt-3 text-blue-100">
                Jus buah segar untuk harimu yang lebih sehat.
            </p>

        </div>

    </section>

    <!-- Produk -->
    <section class="container mx-auto px-6 pb-10">

        <h2 class="font-bold text-2xl mb-6">
            Daftar Jus
        </h2>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.7" data-nama="Jus Alpukat"
                data-harga="15000"
                data-deskripsi="Jus alpukat creamy dengan tambahan susu kental manis dan cokelat, kaya rasa dan mengenyangkan."
                data-bahan="Alpukat, susu kental manis, cokelat, es batu">
                <img src="https://images.unsplash.com/photo-1623123093799-70a72826e167?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NTB8fGp1aWNlfGVufDB8fDB8fHww w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Jus+Alpukat';">

                <div class="p-4">
                    <h3 class="font-bold">Jus Alpukat</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 15.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.7" data-nama="Jus Jeruk"
                data-harga="12000"
                data-deskripsi="Jus jeruk segar tanpa tambahan pengawet, kaya vitamin C dan rasa asam manis yang menyegarkan."
                data-bahan="Jeruk segar, gula, es batu">
                <img src="https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Jus+Jeruk';">

                <div class="p-4">
                    <h3 class="font-bold">Jus Jeruk</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 12.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="5.0" data-nama="Jus Mangga"
                data-harga="14000"
                data-deskripsi="Jus mangga manis dari buah mangga matang pilihan, diolah segar tanpa tambahan pemanis berlebih."
                data-bahan="Mangga matang, gula, es batu">
                <img src="https://plus.unsplash.com/premium_photo-1695055513385-ec5a5093d667?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8anVzJTIwbWFuZ2dhfGVufDB8fDB8fHww w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Jus+Mangga';">

                <div class="p-4">
                    <h3 class="font-bold">Jus Mangga</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 14.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.6" data-nama="Jus Strawberry"
                data-harga="13000"
                data-deskripsi="Jus strawberry segar dengan rasa manis asam yang seimbang, cocok dinikmati dingin di siang hari."
                data-bahan="Strawberry segar, susu/gula, es batu">
                <img src="https://images.unsplash.com/photo-1622597467836-f3285f2131b8?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Jus+Strawberry';">

                <div class="p-4">
                    <h3 class="font-bold">Jus Strawberry</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 13.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

        </div>

    </section>

    <!-- Modal Deskripsi Produk -->
    <div id="modalProduk" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">

        <div class="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-xl relative">

            <button id="btnTutupModal" type="button"
                class="absolute top-3 right-3 w-9 h-9 rounded-full bg-white/90 shadow flex items-center justify-center text-gray-600 hover:text-red-600">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <img id="modalImg" src="" class="w-full h-56 object-cover">

            <div class="p-6">
                <h3 id="modalNama" class="font-bold text-2xl"></h3>
                <p id="modalHarga" class="text-blue-700 font-semibold mt-1"></p>

                <p class="mt-4 text-sm font-semibold text-gray-500">Deskripsi</p>
                <p id="modalDeskripsi" class="text-gray-700 mt-1"></p>

                <p class="mt-4 text-sm font-semibold text-gray-500">Bahan / Komposisi</p>
                <p id="modalBahan" class="text-gray-700 mt-1"></p>
            </div>

        </div>

    </div>

    <!-- Custom JS (Static) -->
    <script src="/js/produk.js"></script>
    <script src="/js/toast.js"></script>
</body>

</html>
