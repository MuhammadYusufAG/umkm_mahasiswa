<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Snack - UNIP Market</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom CSS (Static) -->
    <link class="main-css" rel="stylesheet" href="/css/kategorisnack.css">
</head>


<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow">

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping text-3xl text-blue-700"></i>

                <div>
                    <h1 class="font-bold text-2xl text-blue-700">UNIP</h1>
                    <p class="text-xs tracking-[5px] text-blue-700">MARKET</p>
                </div>
            </div>

            <a href="dashboard.html" class="bg-blue-700 text-white px-4 py-2 rounded-xl">
                Kembali
            </a>

        </div>

    </header>

    <!-- Banner -->
    <section class="container mx-auto px-6 py-8">

        <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white rounded-3xl p-10">

            <h1 class="text-4xl font-bold">
                🍟 Kategori Snack
            </h1>

            <p class="mt-3 text-blue-100">
                Camilan renyah teman nugas dan santai.
            </p>

        </div>

    </section>

    <!-- Produk -->
    <section class="container mx-auto px-6 pb-10">

        <h2 class="font-bold text-2xl mb-6">
            Daftar Snack
        </h2>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.9" data-kategori="snack" data-nama="Kentang Goreng" data-harga="12000" data-deskripsi="Kentang goreng renyah dan gurih, disajikan hangat dengan taburan garam halus." data-bahan="Kentang pilihan, minyak nabati, garam">
                <img src="https://images.unsplash.com/photo-1576107232684-1279f390859f?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer">

                <div class="p-4">
                    <h3 class="font-bold">Kentang Goreng</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 12.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button" class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button" class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="5.0" data-kategori="snack" data-nama="Cireng Bumbu Rujak" data-harga="10000" data-deskripsi="Cireng renyah di luar kenyal di dalam dengan bumbu rujak pedas manis." data-bahan="Tepung tapioka, bawang putih, bumbu rujak">
                <img src="https://images.unsplash.com/photo-1658373072934-d96e583a44f4?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2lyZW5nJTIwYnVtYnUlMjBydWpha3xlbnwwfHwwfHx8MA%3D%3Dw=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer">

                <div class="p-4">
                    <h3 class="font-bold">Cireng Bumbu Rujak</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 10.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button" class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button" class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.6" data-kategori="snack" data-nama="Pisang Crispy" data-harga="11000" data-deskripsi="Pisang manis digoreng dengan tepung crispy pilihan." data-bahan="Pisang, tepung crispy, gula">
                <img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer">

                <div class="p-4">
                    <h3 class="font-bold">Pisang Crispy</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 11.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button" class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button" class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-rating="4.9" data-kategori="snack" data-nama="Sosis Bakar" data-harga="13000" data-deskripsi="Sosis sapi ukuran besar dibakar dengan saus spesial." data-bahan="Sosis sapi, bumbu bakar spesial">
                <img src="https://images.unsplash.com/photo-1633578094666-cf5c46ce2c2a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8c29zaXMlMjBiYWthcnxlbnwwfHwwfHx8MA%3D%3Dw=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer">

                <div class="p-4">
                    <h3 class="font-bold">Sosis Bakar</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 13.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button" class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button" class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

        </div>

    </section>

    <!-- Modal Deskripsi Produk -->
    <div id="modalProduk" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-xl transform transition-all relative">
            <button id="btnTutupModal"
                class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-500 hover:text-red-500 shadow z-10 transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="relative h-64 bg-gray-100">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
            <div class="p-8">
                <h3 id="modalNama" class="text-2xl font-bold text-gray-800">Nama Produk</h3>
                <p id="modalHarga" class="text-xl text-blue-700 font-bold mt-2 mb-6">Rp 0</p>
                
                <div class="space-y-4">
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-1">Deskripsi</p>
                        <p id="modalDeskripsi" class="text-gray-600 text-sm leading-relaxed">...</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold mb-1">Komposisi/Bahan</p>
                        <p id="modalBahan" class="text-gray-600 text-sm leading-relaxed">...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS (Static) -->
    <script src="/js/produk.js"></script>
</body>

</html>
