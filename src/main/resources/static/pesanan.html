<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya - UNIP Market</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow">

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping text-3xl text-blue-700"></i>

                <div>
                    <h1 class="font-bold text-2xl text-blue-700">UNIP</h1>
                    <p class="text-xs tracking-[5px] text-blue-700">MARKET</p>
                </div>
            </div>

            <a href="dashboard.html" class="bg-blue-700 text-white px-4 py-2 rounded-xl">
                Kembali
            </a>

        </div>

    </header>

    <section class="container mx-auto px-6 py-8 max-w-2xl">

        <!-- Status Pesanan -->
        <div class="bg-white rounded-3xl shadow p-6">

            <div id="statusIcon" class="flex justify-center">
                <div class="w-16 h-16 rounded-full bg-yellow-100 flex items-center justify-center">
                    <i class="fa-solid fa-paper-plane text-2xl text-yellow-600"></i>
                </div>
            </div>

            <h2 id="statusJudul" class="text-center font-bold text-xl mt-4">
                Pesanan Terkirim
            </h2>

            <p id="statusKeterangan" class="text-center text-gray-500 mt-1">
                Mohon tunggu, penjual sedang mengonfirmasi pesananmu...
            </p>

            <!-- Ringkasan Produk -->
            <div id="ringkasanProduk" class="mt-6 flex items-center gap-4 bg-gray-50 rounded-2xl p-4">
                <img id="ringkasanGambar" src="" class="w-16 h-16 object-cover rounded-xl">

                <div class="flex-1">
                    <p id="ringkasanNama" class="font-semibold"></p>
                    <p id="ringkasanQty" class="text-sm text-gray-500"></p>
                </div>

                <p id="ringkasanTotal" class="font-bold text-blue-700"></p>
            </div>

            <!-- Status Bar -->
            <div class="flex items-center justify-between mt-6 text-xs text-gray-500">
                <div class="flex flex-col items-center flex-1">
                    <div class="w-8 h-8 rounded-full bg-blue-700 text-white flex items-center justify-center">
                        <i class="fa-solid fa-check text-xs"></i>
                    </div>
                    <p class="mt-1">Terkirim</p>
                </div>

                <div id="lineSatu" class="flex-1 h-1 bg-gray-200 mb-5"></div>

                <div class="flex flex-col items-center flex-1">
                    <div id="iconKonfirmasi"
                        class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center">
                        <i class="fa-solid fa-clock text-xs"></i>
                    </div>
                    <p class="mt-1">Konfirmasi</p>
                </div>

                <div id="lineDua" class="flex-1 h-1 bg-gray-200 mb-5"></div>

                <div class="flex flex-col items-center flex-1">
                    <div id="iconSelesai"
                        class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center">
                        <i class="fa-solid fa-bag-shopping text-xs"></i>
                    </div>
                    <p class="mt-1">Selesai</p>
                </div>
            </div>

        </div>

        <!-- Chat Penjual -->
        <div class="bg-white rounded-3xl shadow mt-6 overflow-hidden">

            <div class="px-5 py-4 border-b flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-700 text-white flex items-center justify-center font-bold">
                    P
                </div>
                <div>
                    <p class="font-semibold">Penjual</p>
                    <p class="text-xs text-green-600">Online</p>
                </div>
            </div>

            <div id="chatBox" class="px-5 py-4 space-y-3 h-64 overflow-y-auto">

                <div class="flex">
                    <div class="bg-gray-100 rounded-2xl px-4 py-2 max-w-[75%] text-sm">
                        Halo, terima kasih sudah memesan! Pesananmu sedang kami konfirmasi ya 🙏
                    </div>
                </div>

            </div>

            <div class="px-5 py-3 border-t flex items-center gap-2">
                <input id="chatInput" type="text" placeholder="Tulis pesan ke penjual..."
                    class="flex-1 bg-gray-100 rounded-xl px-4 py-2 text-sm outline-none">
                <button id="btnKirimChat" type="button"
                    class="bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>

        </div>

        <!-- Tombol Aksi -->
        <div class="mt-6 flex flex-col gap-3">

            <button id="btnKonfirmasiPenjual" type="button"
                class="w-full bg-yellow-500 text-white py-3 rounded-xl font-semibold">
                Simulasikan Penjual Konfirmasi
            </button>

            <button id="btnPesananSelesai" type="button" disabled
                class="w-full bg-gray-300 text-gray-500 py-3 rounded-xl font-semibold cursor-not-allowed">
                Pesanan Selesai
            </button>

        </div>

    </section>

    <script src="/js/pesanan.js"></script>
</body>

</html>
