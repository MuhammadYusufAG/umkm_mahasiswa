<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIP Market - Pesanan Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/pesananPenjual.css">
</head>

<body class="bg-gray-100 flex">

    <!-- SIDEBAR -->
    <aside class="sidebar flex flex-col p-4 sticky top-0 h-screen overflow-y-auto">
        <div class="flex items-center gap-3 px-2 py-4 mb-6">
            <i class="fa-solid fa-cart-shopping text-[#0046ff] text-3xl"></i>
            <div>
                <h1 class="font-bold text-xl text-white">UNIP</h1>
                <p class="text-xs tracking-[4px] text-blue-400">MARKET</p>
            </div>
        </div>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3 px-2">Menu Utama</p>
        <a href="/dashboardPenjual" class="sidebar-link">
            <i class="fa-solid fa-gauge-high w-5"></i> Dashboard
        </a>
        <a href="/kelolaProduk" class="sidebar-link">
            <i class="fa-solid fa-box-open w-5"></i> Kelola Produk
        </a>
        <a href="/pesananPenjual" class="sidebar-link active">
            <i class="fa-solid fa-receipt w-5"></i> Pesanan
            <span class="badge bg-red-500 text-white ml-auto sidebar-badge" style="display:none">0</span>
        </a>
        <a href="/stokProduk" class="sidebar-link">
            <i class="fa-solid fa-warehouse w-5"></i> Stok Produk
        </a>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3 mt-6 px-2">Lainnya</p>
        <a href="/dashboard" class="sidebar-link">
            <i class="fa-solid fa-store w-5"></i> Lihat Toko
        </a>
        <a href="/logout" class="sidebar-link">
            <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
        </a>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col min-h-screen">
        <header class="bg-white shadow-sm px-8 py-4 flex items-center justify-between sticky top-0 z-10">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Pesanan Masuk</h2>
                <p class="text-sm text-gray-400">Pantau dan kelola pesanan masuk toko Anda</p>
            </div>
            <a href="/profile.html" class="w-10 h-10 rounded-full bg-[#0046ff] text-white flex items-center justify-center hover:scale-105 transition" title="Profil Saya">
                <i class="fa-solid fa-user"></i>
            </a>
        </header>

        <main class="flex-1 p-8 overflow-y-auto">

            <!-- TAB FILTER -->
            <div class="flex gap-2 mb-6 bg-white rounded-2xl p-2 shadow w-fit">
                <button class="tab-btn active" onclick="filterTab('Semua', this)">Semua</button>
                <button class="tab-btn" onclick="filterTab('Baru', this)">Baru <span
                        class="badge bg-red-100 text-red-500 ml-1 tab-badge-baru" style="display:none">0</span></button>
                <button class="tab-btn" onclick="filterTab('Diproses', this)">Diproses <span
                        class="badge bg-red-100 text-red-500 ml-1 tab-badge-diproses" style="display:none">0</span></button>
                <button class="tab-btn" onclick="filterTab('Selesai', this)">Selesai</button>
                <button class="tab-btn" onclick="filterTab('Dibatalkan', this)">Dibatalkan</button>
            </div>

            <!-- DAFTAR PESANAN -->
            <div id="daftarPesanan" class="space-y-4"></div>
        </main>
    </div>

    <!-- MODAL CHAT -->
    <div id="modalChat" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300">
            <!-- Header -->
            <div class="px-6 py-4 border-b flex items-center justify-between bg-blue-700 text-white">
                <div>
                    <h3 class="font-bold text-lg">Chat Pembeli</h3>
                    <p id="chatOrderRef" class="text-xs text-blue-200">#ORD-...</p>
                </div>
                <button onclick="tutupChat()" class="text-white hover:text-red-200 transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <!-- Chat Area -->
            <div id="chatBoxSeller" class="p-6 h-80 overflow-y-auto space-y-4 bg-gray-50 flex flex-col">
                <!-- Pesan akan dirender di sini via JS -->
            </div>

            <!-- Input Area -->
            <div class="px-6 py-4 border-t flex items-center gap-2 bg-white">
                <input id="chatInputSeller" type="text" placeholder="Ketik balasan..."
                    class="flex-1 bg-gray-100 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button id="btnKirimChatSeller" type="button" onclick="kirimChatSeller()"
                    class="bg-blue-700 hover:bg-blue-800 text-white w-10 h-10 rounded-xl flex items-center justify-center transition">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/pesananPenjual.js"></script>
    <script src="/js/toast.js"></script>
</body>

</html>
