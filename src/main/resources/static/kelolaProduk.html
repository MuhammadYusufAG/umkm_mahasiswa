<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIP Market - Kelola Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: #0f172a;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-radius: 10px;
            color: #94a3b8;
            transition: .2s;
            margin-bottom: 4px;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: #0046ff;
            color: white;
        }

        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 999px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }
    </style>
</head>

<body class="bg-gray-100 flex">

    <!-- SIDEBAR -->
    <aside class="sidebar flex flex-col p-4 sticky top-0 h-screen overflow-y-auto">
        <div class="flex items-center gap-3 px-2 py-4 mb-6">
            <i class="fa-solid fa-cart-shopping text-[#0046ff] text-3xl"></i>
            <div>
                <h1 class="font-bold text-xl text-white">UNIP</h1>
                <p class="text-xs tracking-[4px] text-blue-400">MARKET</p>
            </div>
        </div>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3 px-2">Menu Utama</p>
        <a href="dashboard-penjual.html" class="sidebar-link">
            <i class="fa-solid fa-gauge-high w-5"></i> Dashboard
        </a>
        <a href="kelola-produk.html" class="sidebar-link active">
            <i class="fa-solid fa-box-open w-5"></i> Kelola Produk
        </a>
        <a href="pesanan-penjual.html" class="sidebar-link">
            <i class="fa-solid fa-receipt w-5"></i> Pesanan
            <span class="badge bg-red-500 text-white ml-auto">3</span>
        </a>
        <a href="stok-produk.html" class="sidebar-link">
            <i class="fa-solid fa-warehouse w-5"></i> Stok Produk
        </a>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3 mt-6 px-2">Lainnya</p>
        <a href="dashboard.html" class="sidebar-link">
            <i class="fa-solid fa-store w-5"></i> Lihat Toko
        </a>
        <a href="login.html" class="sidebar-link">
            <i class="fa-solid fa-right-from-bracket w-5"></i> Logout
        </a>
    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col min-h-screen">
        <header class="bg-white shadow-sm px-8 py-4 flex items-center justify-between sticky top-0 z-10">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Kelola Produk</h2>
                <p class="text-sm text-gray-400">Tambah, edit, atau hapus produk Anda</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openModal()"
                    class="bg-[#0046ff] text-white px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-blue-700 transition">
                    <i class="fa-solid fa-plus"></i> Tambah Produk
                </button>
                <div class="w-10 h-10 rounded-full bg-[#0046ff] text-white flex items-center justify-center font-bold">
                    PJ</div>
            </div>
        </header>

        <main class="flex-1 p-8">

            <!-- FILTER & SEARCH -->
            <div class="bg-white rounded-2xl p-5 shadow mb-6 flex flex-wrap gap-4 items-center">
                <div class="relative flex-1 min-w-[200px]">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Cari nama produk..." oninput="filterProduk()"
                        class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm outline-none focus:border-blue-500">
                </div>
                <select id="filterKategori" onchange="filterProduk()"
                    class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                    <option value="">Semua Kategori</option>
                    <option>Makanan</option>
                    <option>Minuman</option>
                    <option>Snack</option>
                    <option>Dessert</option>
                    <option>Kopi</option>
                    <option>Jus</option>
                    <option>Aksesoris</option>
                    <option>Alat Tulis</option>
                </select>
                <select id="filterStatus" onchange="filterProduk()"
                    class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                    <option value="">Semua Status</option>
                    <option>Aktif</option>
                    <option>Nonaktif</option>
                </select>
            </div>

            <!-- TABEL PRODUK -->
            <div class="bg-white rounded-2xl shadow overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr class="text-left text-gray-500">
                            <th class="px-6 py-4">Produk</th>
                            <th class="px-6 py-4">Kategori</th>
                            <th class="px-6 py-4">Harga</th>
                            <th class="px-6 py-4">Stok</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelProduk" class="divide-y divide-gray-50">
                        <!-- diisi JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL TAMBAH/EDIT PRODUK -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModalOutside(event)">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Tambah Produk</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Nama Produk <span
                            class="text-red-500">*</span></label>
                    <input id="inputNama" type="text" placeholder="Contoh: Nasi Goreng Spesial"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Kategori <span
                                class="text-red-500">*</span></label>
                        <select id="inputKategori"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                            <option value="">Pilih kategori</option>
                            <option>Makanan</option>
                            <option>Minuman</option>
                            <option>Snack</option>
                            <option>Dessert</option>
                            <option>Kopi</option>
                            <option>Jus</option>
                            <option>Aksesoris</option>
                            <option>Alat Tulis</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Harga (Rp) <span
                                class="text-red-500">*</span></label>
                        <input id="inputHarga" type="number" placeholder="15000"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Stok <span class="text-red-500">*</span></label>
                        <input id="inputStok" type="number" placeholder="50"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Status</label>
                        <select id="inputStatus"
                            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500">
                            <option>Aktif</option>
                            <option>Nonaktif</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Deskripsi</label>
                    <textarea id="inputDeskripsi" rows="3" placeholder="Deskripsi singkat produk..."
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-blue-500 resize-none"></textarea>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()"
                    class="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-50 transition">
                    Batal
                </button>
                <button onclick="simpanProduk()"
                    class="flex-1 bg-[#0046ff] text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-700 transition">
                    Simpan Produk
                </button>
            </div>
        </div>
    </div>

    <script>
        let produkList = [];
        let editId = null;

        async function fetchProducts() {
            try {
                const res = await fetch('/api/products/seller');
                if (res.ok) {
                    produkList = await res.json();
                    filterProduk();
                } else if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login';
                }
            } catch(e) {
                console.error(e);
            }
        }

        function renderTabel(list) {
            const tbody = document.getElementById('tabelProduk');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-gray-400">Tidak ada produk ditemukan</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(p => `
        <tr class="hover:bg-gray-50 transition ${!p.isActive ? 'opacity-50' : ''}">
            <td class="px-6 py-4">
                <p class="font-semibold text-gray-800">${p.name}</p>
                <p class="text-xs text-gray-400">${p.description || '-'}</p>
            </td>
            <td class="px-6 py-4 text-gray-500">${p.category || '-'}</td>
            <td class="px-6 py-4 font-semibold text-blue-600">Rp ${p.price.toLocaleString('id-ID')}</td>
            <td class="px-6 py-4">
                <span class="${p.stock <= 5 ? 'text-red-500 font-bold' : 'text-gray-700'}">${p.stock}</span>
                ${p.stock <= 5 ? '<span class="badge bg-red-100 text-red-500 ml-1">Menipis</span>' : ''}
            </td>
            <td class="px-6 py-4">
                <span class="badge ${p.isActive ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-500'}">${p.isActive ? 'Aktif' : 'Nonaktif'}</span>
            </td>
            <td class="px-6 py-4">
                <div class="flex gap-2">
                    <button onclick="editProduk(${p.id})" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 transition flex items-center justify-center">
                        <i class="fa-solid fa-pen-to-square text-xs"></i>
                    </button>
                    <button onclick="toggleStatus(${p.id})" class="w-8 h-8 rounded-lg bg-yellow-50 text-yellow-600 hover:bg-yellow-100 transition flex items-center justify-center" title="Toggle Status">
                        <i class="fa-solid fa-power-off text-xs"></i>
                    </button>
                    <button onclick="hapusProduk(${p.id})" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 transition flex items-center justify-center">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
        }

        function filterProduk() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const kategori = document.getElementById('filterKategori').value;
            const statusFilter = document.getElementById('filterStatus').value;
            
            let filtered = produkList.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search);
                const matchKategori = (kategori === '' || p.category === kategori);
                
                let matchStatus = true;
                if (statusFilter === 'Aktif') matchStatus = p.isActive;
                if (statusFilter === 'Nonaktif') matchStatus = !p.isActive;
                
                return matchSearch && matchKategori && matchStatus;
            });
            renderTabel(filtered);
        }

        function openModal(reset = true) {
            if (reset) {
                editId = null;
                document.getElementById('modalTitle').textContent = 'Tambah Produk';
                ['inputNama', 'inputHarga', 'inputStok', 'inputDeskripsi'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('inputKategori').value = '';
                document.getElementById('inputStatus').value = 'Aktif';
            }
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        }

        function editProduk(id) {
            editId = id;
            const p = produkList.find(x => x.id === id);
            document.getElementById('modalTitle').textContent = 'Edit Produk';
            document.getElementById('inputNama').value = p.name;
            document.getElementById('inputKategori').value = p.category || '';
            document.getElementById('inputHarga').value = p.price;
            document.getElementById('inputStok').value = p.stock;
            document.getElementById('inputStatus').value = p.isActive ? 'Aktif' : 'Nonaktif';
            document.getElementById('inputDeskripsi').value = p.description || '';
            openModal(false);
        }

        async function toggleStatus(id) {
            if(confirm('Yakin ingin mengubah status produk ini?')) {
                try {
                    const res = await fetch('/api/products/seller/' + id + '/toggle-status', { method: 'PATCH' });
                    if(res.ok) fetchProducts();
                    else alert('Gagal merubah status');
                } catch(e) { console.error(e); }
            }
        }

        async function hapusProduk(id) {
            if (confirm('Yakin ingin menghapus produk ini?')) {
                try {
                    const res = await fetch('/api/products/seller/' + id, { method: 'DELETE' });
                    if(res.ok) fetchProducts();
                    else alert('Gagal menghapus produk');
                } catch(e) { console.error(e); }
            }
        }

        async function simpanProduk() {
            const name = document.getElementById('inputNama').value.trim();
            const category = document.getElementById('inputKategori').value;
            const price = parseInt(document.getElementById('inputHarga').value);
            const stock = parseInt(document.getElementById('inputStok').value);
            const isActive = document.getElementById('inputStatus').value === 'Aktif';
            const description = document.getElementById('inputDeskripsi').value.trim();

            if (!name || !category || !price || isNaN(stock)) {
                alert('Mohon lengkapi semua field wajib!');
                return;
            }

            const payload = { name, category, price, stock, isActive, description };
            
            try {
                let url = '/api/products/seller';
                let method = 'POST';
                if (editId) {
                    url += '/' + editId;
                    method = 'PUT';
                }
                
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    closeModal();
                    fetchProducts();
                } else {
                    alert('Gagal menyimpan produk');
                }
            } catch(e) {
                console.error(e);
            }
        }

        fetchProducts();
    </script>
</body>

</html>
