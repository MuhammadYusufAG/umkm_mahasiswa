<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UNIP Market Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/css/login.css">
</head>

<body
    class="bg-gradient-to-br from-[#0038d6] via-[#0046ff] to-[#0033b8] min-h-screen flex items-center justify-center p-5">

    <div class="bg-white rounded-[20px]
        shadow-[0_20px_40px_rgba(0,0,0,0.15)]
        w-full max-w-[420px]
        px-10 py-8">

        <!-- Logo -->
        <div class="text-center">

            <div class="flex justify-center items-center gap-2 text-[#0046ff]">

                <i class="fa-solid fa-cart-shopping text-3xl"></i>

                <div class="text-left">
                    <h2 class="font-bold text-3xl">
                        UNIP
                    </h2>

                    <p class="text-xs tracking-[3px]">
                        MARKET
                    </p>
                </div>

            </div>

            <h3 class="mt-5 text-2xl font-bold text-gray-700">
                Welcome Back!
            </h3>

            <p class="text-sm text-gray-400 mt-1">
                Login to continue to your account
            </p>

        </div>

        <!-- FORM -->
        <form class="mt-8">

            <div>
                <label class="block text-sm text-gray-600 mb-2">
                    Email / Username
                </label>

                <div class="relative">

                    <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input type="text" placeholder="Enter your email or username" class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-4
                        text-sm
                        outline-none
                        focus:border-blue-600">
                </div>
            </div>

            <div class="mt-5">

                <label class="block text-sm text-gray-600 mb-2">
                    Password
                </label>

                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input id="password" type="password" placeholder="Enter your password" class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-10
                        text-sm
                        outline-none
                        focus:border-blue-600">

                    <button id="togglePasswordBtn" type="button" class="absolute right-3 top-1/2 -translate-y-1/2">

                        <i id="eyeIcon" class="fa-regular fa-eye text-gray-500">
                        </i>

                    </button>

                </div>

            </div>

            <div class="flex justify-between items-center mt-4">

                <label class="flex items-center gap-2 text-sm text-gray-500">
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#" class="text-sm text-blue-600 hover:underline">
                    Forgot Password?
                </a>

            </div>

            <button type="submit" class="w-full h-[45px]
                mt-6
                bg-[#0046ff]
                hover:bg-[#0035cc]
                rounded-lg
                font-semibold
                text-white
                transition">

                LOGIN NOW

            </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">

            <div class="flex-1 border-t"></div>

            <span class="text-sm text-gray-400">
                Or login with
            </span>

            <div class="flex-1 border-t"></div>

        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-3">

            <button class="border rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-gray-50">
                <i class="fa-brands fa-google text-red-500"></i>
                Google
            </button>

            <button class="border rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-gray-50">
                <i class="fa-brands fa-facebook text-blue-600"></i>
                Facebook
            </button>

        </div>

        <p class="text-center mt-6 text-sm text-gray-500">

            Don't have an account?

            <a href="#" class="text-blue-700 font-semibold">
                Sign Up Here
            </a>

        </p>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
