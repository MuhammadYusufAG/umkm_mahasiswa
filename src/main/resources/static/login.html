<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UNIP Market Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/css/login.css">
</head>

<body
    class="bg-gradient-to-br from-[#0038d6] via-[#0046ff] to-[#0033b8] min-h-screen flex items-center justify-center p-5">

    <div class="bg-white rounded-[20px]
        shadow-[0_20px_40px_rgba(0,0,0,0.15)]
        w-full max-w-[420px]
        px-10 py-8">

        <!-- Logo -->
        <div class="text-center">

            <div class="flex justify-center items-center gap-2 text-[#0046ff]">

                <i class="fa-solid fa-cart-shopping text-3xl"></i>

                <div class="text-left">
                    <h2 class="font-bold text-3xl">
                        UNIP
                    </h2>

                    <p class="text-xs tracking-[3px]">
                        MARKET
                    </p>
                </div>

            </div>

            <h3 class="mt-5 text-2xl font-bold text-gray-700">
                Welcome Back!
            </h3>

            <p class="text-sm text-gray-400 mt-1">
                Login to continue to your account
            </p>

        </div>

        <!-- FORM -->
        <form class="mt-8">

            <div>
                <label class="block text-sm text-gray-600 mb-2">
                    Email / Username
                </label>

                <div class="relative">

                    <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input type="text" placeholder="Enter your email or username" class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-4
                        text-sm
                        outline-none
                        focus:border-blue-600">
                </div>
            </div>

            <div class="mt-5">

                <label class="block text-sm text-gray-600 mb-2">
                    Password
                </label>

                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input id="password" type="password" placeholder="Enter your password" class="w-full h-[45px]
                        border border-gray-200
                        rounded-lg
                        pl-10 pr-10
                        text-sm
                        outline-none
                        focus:border-blue-600">

                    <button id="togglePasswordBtn" type="button" class="absolute right-3 top-1/2 -translate-y-1/2">

                        <i id="eyeIcon" class="fa-regular fa-eye text-gray-500">
                        </i>

                    </button>

                </div>

            </div>

            <div class="flex justify-between items-center mt-4">

                <label class="flex items-center gap-2 text-sm text-gray-500">
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="/forgot-password" class="text-sm text-blue-600 hover:underline">
                    Forgot Password?
                </a>

            </div>

            <button type="submit" class="w-full h-[45px]
                mt-6
                bg-[#0046ff]
                hover:bg-[#0035cc]
                rounded-lg
                font-semibold
                text-white
                transition">

                LOGIN NOW

            </button>

        </form>



        <p class="text-center mt-6 text-sm text-gray-500">

            Don't have an account?

            <a href="/registrasi" class="text-blue-700 font-semibold hover:underline">
                Sign Up Here
            </a>

        </p>

    </div>
    <!-- Custom Notification Toast -->
    <div id="toastNotification" class="fixed inset-0 flex items-center justify-center bg-black/30 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 flex flex-col items-center text-center">
            <div id="toastIconContainer" class="w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-red-100 text-red-600">
                <i id="toastIcon" class="fa-solid fa-circle-exclamation text-3xl"></i>
            </div>
            <h3 id="toastTitle" class="text-xl font-bold text-gray-800 mb-2">Gagal</h3>
            <p id="toastMessage" class="text-gray-600 mb-6">Pesan error di sini.</p>
            <button id="closeToastBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors w-full">
                Tutup
            </button>
        </div>
    </div>

    <script src="/js/login.js"></script>

    <script src="/js/toast.js"></script>
</body>

</html>
