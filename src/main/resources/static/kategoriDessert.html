<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Dessert - UNIP Market</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Custom CSS (Static) -->
    <link class="main-css" rel="stylesheet" href="/css/kategoridessert.css">
</head>


<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow">

        <div class="container mx-auto px-6 py-4 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cart-shopping text-3xl text-blue-700"></i>

                <div>
                    <h1 class="font-bold text-2xl text-blue-700">UNIP</h1>
                    <p class="text-xs tracking-[5px] text-blue-700">MARKET</p>
                </div>
            </div>

            <a href="dashboard.html" class="bg-blue-700 text-white px-4 py-2 rounded-xl">
                Kembali
            </a>

        </div>

    </header>

    <!-- Banner -->
    <section class="container mx-auto px-6 py-8">

        <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white rounded-3xl p-10">

            <h1 class="text-4xl font-bold">
                🍰 Kategori Dessert
            </h1>

            <p class="mt-3 text-blue-100">
                Manjakan harimu dengan dessert manis favorit.
            </p>

        </div>

    </section>

    <!-- Produk -->
    <section class="container mx-auto px-6 pb-10">

        <h2 class="font-bold text-2xl mb-6">
            Daftar Dessert
        </h2>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-nama="Chocolate Lava Cake"
                data-harga="20000"
                data-deskripsi="Kue cokelat lembut dengan bagian dalam yang masih cair, disajikan hangat sehingga lelehan cokelatnya keluar saat dipotong."
                data-bahan="Tepung terigu, dark chocolate, mentega, telur, gula">
                <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Chocolate+Lava+Cake';">

                <div class="p-4">
                    <h3 class="font-bold">Chocolate Lava Cake</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 20.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-nama="Pudding Caramel"
                data-harga="12000"
                data-deskripsi="Pudding lembut dengan saus karamel manis di atasnya, tekstur creamy yang meleleh di mulut."
                data-bahan="Susu, telur, gula, vanila, karamel">
                <img src="https://images.unsplash.com/photo-1488477181946-6428a0291777?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Pudding+Caramel';">

                <div class="p-4">
                    <h3 class="font-bold">Pudding Caramel</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 12.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-nama="Donat Coklat"
                data-harga="9000"
                data-deskripsi="Donat empuk dilapisi glaze cokelat manis, ditaburi meses sebagai pelengkap rasa dan tampilan."
                data-bahan="Tepung terigu, ragi, gula, glaze cokelat, meses">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Donat+Coklat';">

                <div class="p-4">
                    <h3 class="font-bold">Donat Coklat</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 9.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

            <div class="produk-card bg-white rounded-3xl shadow overflow-hidden" data-nama="Waffle Madu"
                data-harga="17000"
                data-deskripsi="Waffle renyah di luar dan lembut di dalam, disiram madu asli dan ditambah topping buah segar."
                data-bahan="Tepung terigu, telur, mentega, madu, buah segar">
                <img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f?w=500"
                    class="produk-img w-full h-48 object-cover cursor-pointer"
                    onerror="this.onerror=null;this.src='https://placehold.co/500x400/2563eb/ffffff?text=Waffle+Madu';">

                <div class="p-4">
                    <h3 class="font-bold">Waffle Madu</h3>
                    <p class="text-blue-700 font-semibold mt-2">
                        Rp 17.000
                    </p>

                    <div class="qty-control flex items-center justify-between mt-3 bg-gray-100 rounded-xl px-3 py-2">
                        <button type="button"
                            class="btn-minus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">−</button>
                        <span class="qty-value font-semibold">0</span>
                        <button type="button"
                            class="btn-plus w-8 h-8 rounded-lg bg-white shadow text-blue-700 font-bold">+</button>
                    </div>

                    <button class="btn-beli mt-3 w-full bg-blue-700 text-white py-2 rounded-xl">
                        Beli
                    </button>
                </div>
            </div>

        </div>

    </section>

    <!-- Modal Deskripsi Produk -->
    <div id="modalProduk" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">

        <div class="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-xl relative">

            <button id="btnTutupModal" type="button"
                class="absolute top-3 right-3 w-9 h-9 rounded-full bg-white/90 shadow flex items-center justify-center text-gray-600 hover:text-red-600">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <img id="modalImg" src="" class="w-full h-56 object-cover">

            <div class="p-6">
                <h3 id="modalNama" class="font-bold text-2xl"></h3>
                <p id="modalHarga" class="text-blue-700 font-semibold mt-1"></p>

                <p class="mt-4 text-sm font-semibold text-gray-500">Deskripsi</p>
                <p id="modalDeskripsi" class="text-gray-700 mt-1"></p>

                <p class="mt-4 text-sm font-semibold text-gray-500">Bahan / Komposisi</p>
                <p id="modalBahan" class="text-gray-700 mt-1"></p>
            </div>

        </div>

    </div>

    <!-- Custom JS (Static) -->
    <script src="/js/produk.js"></script>
</body>

</html>
